<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osmanlı Kelime Koşusu - Hassas Sürüm</title>
    <style>
        :root {
            --bg: #fdf5e6; --ground: #4b3621; --player: #d32f2f;
            --accent: #ff9800; --text: #2b1d0e; --ui-bg: rgba(255, 255, 255, 0.95);
        }
        [data-theme="dark"] {
            --bg: #1a1a1a; --ground: #000; --player: #ff1744;
            --accent: #ffc107; --text: #fff; --ui-bg: rgba(40, 40, 40, 0.95);
        }
        body, html { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: var(--text); pointer-events: none; z-index: 10; }
        .score-box { font-size: 2rem; font-weight: bold; text-shadow: 2px 2px 0px rgba(0,0,0,0.1); }
        
        #quiz-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100;
        }
        .quiz-card {
            background: var(--ui-bg); padding: 30px; border-radius: 20px; text-align: center;
            width: 85%; max-width: 450px; border: 4px solid var(--accent);
        }
        .opt-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .opt-btn {
            padding: 15px; border: 2px solid var(--ground); border-radius: 10px;
            background: white; color: black; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .opt-btn:hover { background: var(--accent); color: white; transform: scale(1.02); }
        .theme-btn { position: absolute; top: 20px; right: 20px; padding: 10px 20px; border-radius: 20px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body data-theme="light">

    <button class="theme-btn" onclick="toggleTheme()">🌓 Görünüm</button>
    <div id="ui">
        <div class="score-box">Mesafe: <span id="dist">0</span>m</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <h2 id="q-word" style="color:var(--player)">Kelime</h2>
            <p id="q-desc" style="font-style: italic; font-size: 0.9rem;"></p>
            <div class="opt-list" id="q-options"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const distEl = document.getElementById('dist');
        const overlay = document.getElementById('quiz-overlay');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const wordPool = [
            { t: "Külliye", m: "Yerleşke, kampüs", d: "Camii etrafındaki yapılar topluluğu" },
            { t: "Şifahane", m: "Hastane", d: "Hastaların tedavi edildiği yer" },
            { t: "Medrese", m: "Okul, fakülte", d: "İslami ve bilimsel eğitim verilen okul" },
            { t: "İmaret", m: "Aşevi", d: "Fakirlere ücretsiz yemek verilen yer" },
            { t: "Darülaceze", m: "Huzurevi", d: "Yaşlı ve düşkünlerin barınağı" },
            { t: "Darüleytam", m: "Yetimhane", d: "Yetim çocukların barındığı yer" },
            { t: "Kervansaray", m: "Otel, konukevi", d: "Yolcuların konakladığı büyük han" },
            { t: "Darülfünun", m: "Üniversite", d: "Osmanlı döneminde yüksek öğretim kurumu" },
            { t: "Sıbyan Mektebi", m: "İlkokul", d: "Temel eğitim verilen okul" },
            { t: "Bedesten", m: "Kuyumcular çarşısı", d: "Değerli malların satıldığı kapalı pazar" }
        ];

        let state = {
            active: true, speed: 7, distance: 0, frame: 0,
            player: {
                x: 150, y: 0, w: 50, h: 50, dy: 0, gravity: 0.8, jump: -16, rot: 0, grounded: false,
                // Hassas Hitbox: Görselden %20 daha küçük merkezlenmiş bir kutu
                get hitbox() {
                    return { x: this.x + 8, y: this.y + 8, w: 34, h: 34 };
                }
            },
            obstacles: [], gates: []
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Zemin ve Arka Plan
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--ground');
            ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

            // Karakter Çizimi
            ctx.save();
            ctx.translate(state.player.x + 25, state.player.y + 25);
            ctx.rotate(state.player.rot);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--player');
            ctx.fillRect(-25, -25, 50, 50);
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--accent');
            ctx.fillRect(-25, -25, 50, 10); // Fes detayı
            ctx.restore();

            // Engeller
            state.obstacles.forEach((o, i) => {
                o.x -= state.speed;
                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.moveTo(o.x, o.y + 40); ctx.lineTo(o.x + 20, o.y); ctx.lineTo(o.x + 40, o.y + 40);
                ctx.fill();

                // Engel Hitbox'ı: Üçgenin tabanına yakın küçük bir alan (Daha adil)
                let oHit = { x: o.x + 10, y: o.y + 10, w: 20, h: 30 };
                if (checkCollision(state.player.hitbox, oHit)) endGame();
                if (o.x < -100) state.obstacles.splice(i, 1);
            });

            // Kapılar
            state.gates.forEach((g, i) => {
                g.x -= state.speed;
                ctx.fillStyle = "rgba(255, 152, 0, 0.2)";
                ctx.fillRect(g.x, g.y, g.w, g.h);
                ctx.strokeStyle = "orange";
                ctx.lineWidth = 3;
                ctx.strokeRect(g.x, g.y, g.w, g.h);

                if (state.player.x > g.x && state.player.x < g.x + g.w) {
                    openQuiz();
                    state.gates.splice(i, 1);
                }
            });
        }

        function update() {
            if (!state.active) return;

            state.player.dy += state.player.gravity;
            state.player.y += state.player.dy;

            if (!state.player.grounded) state.player.rot += 0.15;
            else state.player.rot = 0;

            if (state.player.y + 50 > canvas.height - 60) {
                state.player.y = canvas.height - 60 - 50;
                state.player.dy = 0;
                state.player.grounded = true;
            }

            state.frame++;
            if (state.frame % 120 === 0) state.obstacles.push({ x: canvas.width, y: canvas.height - 100, w: 40, h: 40 });
            if (state.frame % 600 === 0) state.gates.push({ x: canvas.width, y: 0, w: 60, h: canvas.height - 60 });

            state.distance++;
            distEl.innerText = Math.floor(state.distance / 10);
            
            draw();
            requestAnimationFrame(update);
        }

        function checkCollision(r1, r2) {
            return !(r2.x > r1.x + r1.w || r2.x + r2.w < r1.x || r2.y > r1.y + r1.h || r2.y + r2.h < r1.y);
        }

        function openQuiz() {
            state.active = false;
            const target = wordPool[Math.floor(Math.random() * wordPool.length)];
            document.getElementById('q-word').innerText = target.t;
            document.getElementById('q-desc').innerText = target.d;

            let wrongMeans = wordPool.filter(w => w.m !== target.m).map(w => w.m);
            wrongMeans = wrongMeans.sort(() => 0.5 - Math.random()).slice(0, 2);

            const options = [target.m, ...wrongMeans].sort(() => 0.5 - Math.random());
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = '';

            options.forEach(opt => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = opt;
                b.onclick = () => {
                    if (opt === target.m) {
                        state.active = true;
                        overlay.style.display = 'none';
                        state.speed += 0.5;
                        update();
                    } else {
                        endGame("Yanlış cevap! " + target.t + " = " + target.m);
                    }
                };
                optDiv.appendChild(b);
            });
            overlay.style.display = 'flex';
        }

        function endGame(msg = "Engele çarptın!") {
            alert(msg);
            location.reload();
        }

        function toggleTheme() {
            document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && state.player.grounded) {
                state.player.dy = state.player.jump;
                state.player.grounded = false;
            }
        });
        
        canvas.addEventListener('mousedown', () => {
            if (state.player.grounded) {
                state.player.dy = state.player.jump;
                state.player.grounded = false;
            }
        });

        update();
    </script>
</body>
</html>
